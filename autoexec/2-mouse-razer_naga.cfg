
echo "Loading mouse-razer_naga (~/Projects/cs2-config/autoexec/2-mouse-razer_naga.cfg)"

bind "MOUSE_X" "yaw"
bind "MOUSE_Y" "pitch"
bind "MOUSE1" "+attack"
bind "MOUSE2" "+attack2"
bind "MOUSE3" "player_ping"
bind "MWHEELUP" "player_ping"
bind "MWHEELDOWN" "+jump"

// Mouse Keys (F1-F12)
// -------------------

// Mouse - Weapons
bind "F1" "slot2; slot1; -grenadecrosshair; vote option1"
bind "F2" "slot2; slot1; -grenadecrosshair; vote option2"
bind "F4" "+lookatweapon"
// Mouse - Grenades
bind "F3" "slot7; +grenadecrosshair"   // Flash
bind "F6" "slot6; +grenadecrosshair"   // HE
bind "F9" "slot10; +grenadecrosshair"  // Molly/Incendiary
bind "F12" "slot8; +grenadecrosshair"  // Smoke
bind "F10" "sellbackall"
bind "F11" "switchhands"
// Mouse - Misc
bind "F5" "noclip"                                 // Fly (noclip)
bind "F7" "sv_rethrow_last_grenade"                // Rethrow grenade
bind "F8" "ent_fire smokegrenade_projectile kill"  // Clear smoke
