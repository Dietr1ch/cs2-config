echo "Loading config-crosshair (~/Projects/cs2-config/autoexec/1-config-crosshair)"

// Grenade crosshair
alias "+grenadecrosshair" "cl_crosshairsize 1000; cl_crosshairgap -10; cl_crosshairthickness 0.5; cl_crosshair_drawoutline 1"
alias "-grenadecrosshair" "cl_crosshairsize 3; cl_crosshairgap 0; cl_crosshairthickness 0.5; cl_crosshair_drawoutline 1"

alias "+pew" "+attack; cl_crosshair_recoil true;"
alias "-pew" "-attack; cl_crosshair_recoil false;"