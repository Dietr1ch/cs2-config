
echo "Executing keyboard-ergodox_ez (~/.local/share/Steam/steamapps/common/Counter-Strike Global Offensive/game/csgo/cfg/keyboard-ergodox_ez.cfg)"

bind "1" "slot1; -grenadecrosshair"  // Primary
bind "2" "slot2; -grenadecrosshair"  // Pistol
bind "3" "slot3; -grenadecrosshair"  // Knife
bind "4" "slot4; +grenadecrosshair"  // HE
bind "5" "slot7; +grenadecrosshair"  // FLASH
bind "6" "slot5; -grenadecrosshair"  // C4
bind "7" "slot5; -grenadecrosshair"  // C4
bind "8" "buymenu"

bind "9" "slot12"  // Health
bind "0"    "+radialradio"
bind "HOME" "+radialradio2"
bind "END"  "+radialradio3"

// bind "q" "lastinv"
bind "w" "+forward"
bind "e" "+use"
bind "r" "+reload"
bind "t" "+spray_menu"
bind "a" "+left"
bind "s" "+back"
bind "d" "+right"
bind "f" "+lookatweapon"
bind "g" "drop"

// Grenades
bind "z" "slot9; +grenadecrosshair"   // Decoy
bind "x" "slot8; +grenadecrosshair"   // Smoke
bind "c" "slot10; +grenadecrosshair"  // Molly/Incendiary
bind "v" "slot6; +grenadecrosshair"   // HE
bind "b" "slot7; +grenadecrosshair"   // Flash

// Radio
bind "h" say "playvalorant.com/download/"
bind "j" "radio1"
bind "k" "radio2"
bind "l" "radio3"

// Comms
bind "y" "messagemode"
bind "u" "messagemode2"


// Debug
// PLACE BOT:  N/B
bind "ENTER" "bot_place"
// bind "ENTER" "show_loadout_toggle"
