
echo "Loading keyboard-common (~/Projects/cs2-config/autoexec/4-keyboard-common.cfg)"

bind "PAUSE" "pause"

bind "ESCAPE" "cancelselect"
bind "TAB" "+showscores"
bind "CTRL" "+duck"
